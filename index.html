<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding — Experimental Interactions</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Three.js r128 with working CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
</head>
<body class="bg-grid">
    <!-- Custom Cursor -->
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    
    <!-- Background is fixed to grid by default -->

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-left">
            <button class="lang-toggle" id="langToggle">EN / GER</button>
        </div>
        <div class="nav-center">
            <a href="#projects" class="nav-link">Projects</a>
            <a href="#resume" class="nav-link">Resume</a>
        </div>
            <div class="nav-right">
                <a href="#contact" class="nav-contact-btn">Contact me</a>
            </div>
        </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <div id="threejs-hero"></div>
        </div>
        
        <!-- Floating Elements -->
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </section>

    <!-- Interactive Grid Section -->
    <section class="grid-section" id="projects">
        <h2 class="section-title">Projekte</h2>
        <div class="interactive-grid">
            <div class="grid-item project-preview" data-color="#4A5C3E" data-project="iks">
                <div class="grid-image" style="background-image: url('iks/iks.foto.png');"></div>
                <div class="grid-content">
                    <span class="grid-number">01</span>
                    <h3>IKS</h3>
                    <p class="grid-subtitle">Ausstellungsgestaltung</p>
                </div>
            </div>
            <div class="grid-item project-preview" data-color="#A8C69F" data-project="datenvisualisierung">
                <div class="grid-image" style="background-image: url('datenvisualisierung/datenvisualisierung.foto.png');"></div>
                <div class="grid-content">
                    <span class="grid-number">02</span>
                    <h3>Datenvisualisierung</h3>
                    <p class="grid-subtitle">Simulation</p>
                </div>
            </div>
            <div class="grid-item project-preview" data-color="#C3756B" data-project="interface">
                <div class="grid-image" style="background-image: url('interface/interface.foto.png');"></div>
                <div class="grid-content">
                    <span class="grid-number">03</span>
                    <h3>Interface</h3>
                    <p class="grid-subtitle">Interaktionsdesign</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Text reveal removed per request -->

    <!-- Removed: Letter Tumble, 3D Cube, and Project Detail sections -->

    <!-- Footer -->
    <!-- Contact Section (bottom of page) -->
    <section id="contact" class="contact-section">
        <div class="contact-inner">
            <h2 class="contact-title">Contact</h2>
            <p class="contact-copy">Write me an email — I usually reply quickly.</p>
            <div class="contact-row">
                <span class="contact-email" id="contactEmail">09daube.ding@icloud.com</span>
                <button id="copyEmailBtn" class="copy-email-btn">Copy email</button>
            </div>
        </div>
    </section>

    <!-- Footer removed per request -->

    <script src="script.js"></script>
</body>
</html>
